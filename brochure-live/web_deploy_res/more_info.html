    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link

        rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ededed",
                        "neon-blue": "#0070f3",
                        "neon-green": "#10b981",
                        "neon-purple": "#8b5cf6",
                        "background-light": "#ffffff",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Geist", "sans-serif"],
                        "sans": ["Geist", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                },
            },
        }</script>
    <style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #0a0a0a;
            color: #ededed;
            overflow-x: hidden;
            min-width: 1280px;
        }

        ::selection {
            background-color: #333;
            color: white;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        /* Subdued Glows (10-15% opacity) */
        .glow-text-blue {
            text-shadow: 0 0 10px rgba(0, 112, 243, 0.15);
        }

        .glow-text-green {
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.15);
        }

        .glow-text-purple {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.15);
        }

        /* Subtle Borders with reveal on hover */
        .neon-border-blue {
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.2s ease;
        }

        .neon-border-blue:hover {
            border-color: rgba(0, 112, 243, 0.4);
        }

        .neon-border-green {
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.2s ease;
        }

        .neon-border-green:hover {
            border-color: rgba(16, 185, 129, 0.4);
        }

        .neon-border-purple {
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.2s ease;
        }

        .neon-border-purple:hover {
            border-color: rgba(139, 92, 246, 0.4);
        }

        /* Subtle Grid */
        .cyber-grid {
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* Glass Panels */
        .glass-cyber {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .neon-glow {
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.1));
        }

        /* Smooth transitions removed */
    </style>
</head>
