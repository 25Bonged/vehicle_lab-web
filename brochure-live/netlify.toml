[[redirects]]
  from = "/web_deploy_res/case_studies.html"
  to = "/casestudy.html"
  status = 301
[[redirects]]
  from = "/web_deploy_res/pricing.html"
  to = "/specs.html"
  status = 301
[[redirects]]
  from = "/web_deploy_res/more_info.html"
  to = "/features.html"
