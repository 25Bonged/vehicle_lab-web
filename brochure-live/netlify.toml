[build]
  publish = "."
  command = ""

# Clean product URLs (4 products) — rewrite so URL stays /diagai, /helix, /cie, /mdx
[[redirects]]
  from = "/diagai"
  to = "/diagai.html"
  status = 200
[[redirects]]
  from = "/helix"
  to = "/helix.html"
  status = 200
[[redirects]]
  from = "/cie"
  to = "/cie.html"
  status = 200
[[redirects]]
  from = "/mdx"
  to = "/mdx.html"
  status = 200

# Redirect rules for routing diagnostics to Render app
# This proxies /diagnostics/* requests to your Render app
# Proxy rules
[[redirects]]
  from = "/diagnostics/*"
  to = "https://vehicle-lab-web-deploy.onrender.com/diagnostics/:splat"
  status = 200
  force = true
[[redirects]]
  from = "/diagnostics"
  to = "https://vehicle-lab-web-deploy.onrender.com/diagnostics"
  status = 200
  force = true
[[redirects]]
  from = "/api/*"
  to = "https://vehicle-lab-web-deploy.onrender.com/api/:splat"
  status = 200
  force = true
[[redirects]]
  from = "/smart_merge_upload"
  to = "https://vehicle-lab-web-deploy.onrender.com/smart_merge_upload"
  status = 200
  force = true
[[redirects]]
  from = "/analytics"
  to = "https://vehicle-lab-web-deploy.onrender.com/analytics"
  status = 200
  force = true
[[redirects]]
  from = "/health"
  to = "https://vehicle-lab-web-deploy.onrender.com/health"
  status = 200
  force = true
[[redirects]]
  from = "/ingest/*"
  to = "https://vehicle-lab-web-deploy.onrender.com/ingest/:splat"
  status = 200
  force = true

